name: Pull Request Labeler

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labeler:
    name: Apply Area Labels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@v6
        with:
          sync-labels: true
