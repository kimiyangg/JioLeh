name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  android-release:
    name: Build & Upload Android
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./gi_jios

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: |
          flutter build apk --debug \
            --dart-define=MAPBOX_ACCESS_TOKEN="${{ secrets.MAPBOX_ACCESS_TOKEN }}" \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=MAPBOX_STYLE_URI="${{ secrets.MAPBOX_STYLE_URI }}"

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ github.ref_name }}
          path: gi_jios/build/app/outputs/flutter-apk/app-debug.apk
