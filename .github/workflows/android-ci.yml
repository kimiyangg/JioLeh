name: "Build (& Deploy to Google Play) Android APP"
run-name: "Android Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android App (${{ github.ref_name }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            android/build.gradle.kts
            android/app/build.gradle.kts
            android/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Derive Android release version
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          if ! [[ "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' does not produce a valid Android version name."
            echo "Use a tag like v1.2.3."
            exit 1
          fi

          {
            echo "ANDROID_VERSION_NAME=$VERSION_NAME"
            echo "ANDROID_BUILD_NUMBER=$BUILD_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Configure Android release signing
        env:
          PLAY_SIGNING_KEY: ${{ secrets.PLAY_SIGNING_KEY }}
          PLAY_SIGNING_KEY_ALIAS: ${{ secrets.PLAY_SIGNING_KEY_ALIAS }}
          PLAY_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.PLAY_SIGNING_KEY_STORE_PASSWORD }}
          PLAY_SIGNING_KEY_PASSWORD: ${{ secrets.PLAY_SIGNING_KEY_PASSWORD }}
        run: |
          echo "$PLAY_SIGNING_KEY" | base64 --decode > android/app/upload-keystore.jks

          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=$PLAY_SIGNING_KEY_STORE_PASSWORD"
            echo "keyAlias=$PLAY_SIGNING_KEY_ALIAS"
            echo "keyPassword=$PLAY_SIGNING_KEY_PASSWORD"
          } > android/key.properties

      - name: Build Android App Bundle
        run: |
          flutter build appbundle --release \
            --build-name="$ANDROID_VERSION_NAME" \
            --build-number="$ANDROID_BUILD_NUMBER" \
            --dart-define=MAPBOX_ACCESS_TOKEN="${{ secrets.MAPBOX_ACCESS_TOKEN }}" \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=MAPBOX_STYLE_URI="${{ secrets.MAPBOX_STYLE_URI }}"

      - name: Build Android APK
        run: |
          flutter build apk --release \
            --build-name="$ANDROID_VERSION_NAME" \
            --build-number="$ANDROID_BUILD_NUMBER" \
            --dart-define=MAPBOX_ACCESS_TOKEN="${{ secrets.MAPBOX_ACCESS_TOKEN }}" \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=MAPBOX_STYLE_URI="${{ secrets.MAPBOX_STYLE_URI }}"

      - name: Archive Android build output
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 1

  deploy-android:
    name: Deploy Android to Google Play (${{ github.ref_name }})
    needs: build-android
    runs-on: ubuntu-latest

    steps:
      - name: Download Android build output
        uses: actions/download-artifact@v5
        with:
          name: android-build
          path: android-build

      - name: Prepare AAB for upload
        run: |
          AAB_PATH="$(find android-build -name '*.aab' -print -quit)"
          APK_PATH="$(find android-build -name '*.apk' -print -quit)"
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"

          if [ -z "$AAB_PATH" ]; then
            echo "No AAB found in android-build"
            exit 1
          fi

          if [ -z "$APK_PATH" ]; then
            echo "No APK found in android-build"
            exit 1
          fi

          cp "$AAB_PATH" app-release.aab
          cp "$APK_PATH" app-release.apk
          cp "$AAB_PATH" "jio-leh-android-${RELEASE_VERSION}.aab"
          cp "$APK_PATH" "jio-leh-android-${RELEASE_VERSION}.apk"
          ls -lh app-release.aab app-release.apk jio-leh-android-*.aab jio-leh-android-*.apk

      - name: Validate Google Play service account
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$SERVICE_ACCOUNT_JSON" ]; then
            echo "SERVICE_ACCOUNT_JSON secret is empty or unavailable."
            exit 1
          fi

          if ! jq -e '.type == "service_account" and (.client_email | length > 0) and (.private_key | length > 0)' <<< "$SERVICE_ACCOUNT_JSON" > /dev/null; then
            echo "SERVICE_ACCOUNT_JSON must be the full Google service account JSON key."
            exit 1
          fi

      - name: Deploy to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.gijios.jioleh
          releaseFiles: ./app-release.aab
          tracks: internal
          inAppUpdatePriority: 3
          status: completed
          changesNotSentForReview: false

      - name: Upload Android files to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jio-leh-android-*.aab
            jio-leh-android-*.apk
          fail_on_unmatched_files: true
