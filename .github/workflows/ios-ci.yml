name: "Build (& Deploy to TestFlight) iOS APP"
run-name: "iOS Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-ios:
    name: Build iOS App (${{ github.ref_name }})
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify export compliance flag
        run: |
          EXPORT_COMPLIANCE=$(/usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" ios/Runner/Info.plist)

          if [ "$EXPORT_COMPLIANCE" != "false" ]; then
            echo "ITSAppUsesNonExemptEncryption must be false for this app."
            exit 1
          fi

      - name: Derive iOS release version
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          if ! [[ "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' does not produce a valid iOS version name."
            echo "Use a tag like v1.2.3."
            exit 1
          fi

          {
            echo "IOS_VERSION_NAME=$VERSION_NAME"
            echo "IOS_BUILD_NUMBER=$BUILD_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Install the Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-ci-build-keychain}"
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo -n "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$RUNNER_TEMP/profile.plist")

          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"

          {
            echo "IOS_PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME"
            echo "IOS_DEVELOPMENT_TEAM=$TEAM_ID"
          } >> "$GITHUB_ENV"

          /usr/libexec/PlistBuddy -c "Add :method string app-store" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string Apple Distribution" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.gijios.jioleh string $PROFILE_NAME" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :compileBitcode bool false" "$RUNNER_TEMP/ExportOptions.plist"

      - name: Build iOS IPA
        run: |
          flutter build ipa --release \
            --build-name="$IOS_VERSION_NAME" \
            --build-number="$IOS_BUILD_NUMBER" \
            --export-options-plist="$RUNNER_TEMP/ExportOptions.plist" \
            --dart-define=MAPBOX_ACCESS_TOKEN="${{ secrets.MAPBOX_ACCESS_TOKEN }}" \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=MAPBOX_STYLE_URI="${{ secrets.MAPBOX_STYLE_URI }}"

      - name: Archive iOS build output
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

  deploy-ios:
    name: Deploy iOS to TestFlight (${{ github.ref_name }})
    needs: build-ios
    runs-on: macos-latest

    steps:
      - name: Download iOS build output
        uses: actions/download-artifact@v5
        with:
          name: ios-build
          path: ios-build

      - name: Prepare IPA for upload
        run: |
          IPA_PATH="$(find ios-build -name '*.ipa' -print -quit)"
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"

          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in ios-build"
            exit 1
          fi

          cp "$IPA_PATH" App.ipa
          cp "$IPA_PATH" "jio-leh-ios-${RELEASE_VERSION}.ipa"

      - name: Upload app to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          if [[ "$APP_STORE_CONNECT_API_KEY_CONTENT" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "$APP_STORE_CONNECT_API_KEY_CONTENT" > "$KEY_PATH"
          else
            echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 -D > "$KEY_PATH"
          fi

          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_PATH" || ! grep -q "END PRIVATE KEY" "$KEY_PATH"; then
            echo "APP_STORE_CONNECT_API_KEY_CONTENT must be the AuthKey .p8 file content or a base64 encoding of the full .p8 file."
            exit 1
          fi

          chmod 600 "$KEY_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file App.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload iOS IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: jio-leh-ios-*.ipa
          fail_on_unmatched_files: true
