name: "Build (& Deploy to TestFlight) iOS APP"

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./gi_jios

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install the Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-ci-build-keychain}"
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo -n "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$RUNNER_TEMP/profile.plist")

          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"

          {
            echo "IOS_PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME"
            echo "IOS_DEVELOPMENT_TEAM=$TEAM_ID"
          } >> "$GITHUB_ENV"

          /usr/libexec/PlistBuddy -c "Add :method string app-store" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string Apple Distribution" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.gijios.jioleh string $PROFILE_NAME" "$RUNNER_TEMP/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Add :compileBitcode bool false" "$RUNNER_TEMP/ExportOptions.plist"

      - name: Build iOS IPA
        run: |
          flutter build ipa --release \
            --export-options-plist="$RUNNER_TEMP/ExportOptions.plist" \
            --dart-define=MAPBOX_ACCESS_TOKEN="${{ secrets.MAPBOX_ACCESS_TOKEN }}" \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=MAPBOX_STYLE_URI="${{ secrets.MAPBOX_STYLE_URI }}"

      - name: Archive iOS build output
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: gi_jios/build/ios/ipa/*.ipa
          if-no-files-found: error

  deploy-ios:
    name: Deploy iOS to TestFlight
    needs: build-ios
    runs-on: macos-latest

    steps:
      - name: Download iOS build output
        uses: actions/download-artifact@v5
        with:
          name: ios-build
          path: ios-build

      - name: Prepare IPA for upload
        run: |
          IPA_PATH="$(find ios-build -name '*.ipa' -print -quit)"

          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in ios-build"
            exit 1
          fi

          cp "$IPA_PATH" App.ipa

      - name: Upload app to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 -D > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          xcrun altool --upload-app \
            --type ios \
            --file App.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"
